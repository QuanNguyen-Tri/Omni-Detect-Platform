name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect package manager
        id: package-manager
        working-directory: frontend
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "lockfile=pnpm-lock.yaml" >> "$GITHUB_OUTPUT"
            echo "install=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "build=pnpm run build" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "lockfile=yarn.lock" >> "$GITHUB_OUTPUT"
            echo "install=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "build=yarn build" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "lockfile=package-lock.json" >> "$GITHUB_OUTPUT"
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
            echo "build=npm run build" >> "$GITHUB_OUTPUT"
          elif [ -f npm-shrinkwrap.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "lockfile=npm-shrinkwrap.json" >> "$GITHUB_OUTPUT"
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
            echo "build=npm run build" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "lockfile=" >> "$GITHUB_OUTPUT"
            echo "install=npm install" >> "$GITHUB_OUTPUT"
            echo "build=npm run build" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.package-manager.outputs.lockfile == ''
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set up Node.js with dependency cache
        if: steps.package-manager.outputs.lockfile != ''
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: ${{ steps.package-manager.outputs.manager }}
          cache-dependency-path: frontend/${{ steps.package-manager.outputs.lockfile }}

      - name: Enable Corepack
        if: steps.package-manager.outputs.manager != 'npm'
        run: corepack enable

      - name: Install dependencies
        working-directory: frontend
        run: ${{ steps.package-manager.outputs.install }}

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || format('/{0}/', github.event.repository.name) }}
          VITE_OMNI_DETECT_BACKEND_URL: ${{ vars.VITE_OMNI_DETECT_BACKEND_URL }}
        run: ${{ steps.package-manager.outputs.build }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy frontend
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
